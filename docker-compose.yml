services:
  mysql:
    image: mysql:8.0
    container_name: inventario-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: inventario_db
      MYSQL_USER: inventario
      MYSQL_PASSWORD: inventario123
    ports:
      - "3307:3306"
    volumes:
      - inventario_mysql:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  inventario_mysql:
