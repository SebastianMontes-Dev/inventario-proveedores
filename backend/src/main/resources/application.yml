server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/inventario_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:inventario}
    password: ${DB_PASSWORD:inventario123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:3000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:3000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:3000}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

app:
  time-zone: ${APP_TIME_ZONE:America/Bogota}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:dev-local-jwt-secret-key-at-least-32-chars-long}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  auth:
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    # Strict/Lax si frontend y backend comparten sitio; None (con cookie-secure=true) si estan en dominios distintos.
    cookie-same-site: ${AUTH_COOKIE_SAME_SITE:Strict}
  mail:
    from: ${MAIL_FROM:no-reply@inventario.local}
    ops-email: ${OPS_EMAIL:admin@inventario.local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
