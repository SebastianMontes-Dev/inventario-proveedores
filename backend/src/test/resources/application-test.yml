spring:
  datasource:
    url: jdbc:h2:mem:inventario_test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  mail:
    host: localhost
    port: 3025

app:
  time-zone: UTC
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: integration-test-secret-key-at-least-32-chars-long
    expiration-minutes: 60
  auth:
    cookie-secure: false
    cookie-same-site: Strict
  mail:
    from: no-reply@inventario.local
    ops-email: ops@inventario.local
