name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inventario_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done

      - name: Run schema and seed
        run: |
          mysql -h 127.0.0.1 -u root -proot inventario_test < db/schema.sql
          mysql -h 127.0.0.1 -u root -proot inventario_test < db/data.sql

      - name: Run tests
        run: mvn test -B
        working-directory: backend
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/inventario_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          DB_USERNAME: root
          DB_PASSWORD: root
          JWT_SECRET: github-actions-ci-test-secret-key-at-least-32-chars-long
